name: Build Release Image

on:
  workflow_dispatch:

  release:
    types: [ published ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: frequenz-cs-reporting

jobs:
  build_image:
    name: Build docker image
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        os:
          - ubuntu-24.04
        python:
          - "3.12"
    runs-on: ubuntu-24.04

    steps:
      # - name: Setup Git
      #   uses: frequenz-floss/gh-action-setup-git@v1.0.0
      #   with:
      #     secrets: |
      #       GIT_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Fetch sources
        uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}          

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set helper environment variables
        run: |
          echo "REGISTRY_IMAGE=${REGISTRY}/frequenz-floss/${IMAGE_NAME}" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Ensure pip cache directory exists
        run: mkdir -p "$HOME/.cache/pip"

      - name: Pip cache for Docker
        uses: actions/cache@v5
        id: pip-cache
        with:
          path: ${{ env.HOME }}/.cache/pip
          key: ${{ runner.arch }}-${{ runner.os }}-pip-cache-${{ hashFiles('Dockerfile') }}

      - name: Inject pip-cache into docker
        uses: reproducible-containers/buildkit-cache-dance@1b8ab18fbda5ad3646e3fcc9ed9dd41ce2f297b4 # v3.3.2
        with:
          cache-map: |
            {
              "pip-cache": "${{ env.HOME }}/.cache/pip"
            }
          skip-extraction: ${{ steps.pip-cache.outputs.cache-hit }}

      - name: Link .gitignore to .dockerignore
        # We only need the sources here, so we can ignore everything else that's also ignored by Git
        run: ln -s .gitignore .dockerignore

      - name: Build and push docker image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge_multiple_digests:
    name: Merge multiple image digests
    needs: ["build_image"]
    runs-on: ubuntu-24.04

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set helper environment variables
        run: |
          echo "REGISTRY_IMAGE=${REGISTRY}/frequenz-floss/${IMAGE_NAME}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker buildx imagetools inspect ${REGISTRY_IMAGE}:${VERSION}
